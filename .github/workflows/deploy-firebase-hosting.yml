name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "firebase-hosting"
  cancel-in-progress: false

env:
  BUILD_PATH: "."

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          # Pin node version to the following due bug firebase hosting throws error on success deployment. See:
          # https://github.com/FirebaseExtended/action-hosting-deploy/issues/460
          # https://github.com/firebase/firebase-tools/issues/10716#issuecomment-4800040219
          node-version: "24.18.0"

      - uses: pnpm/action-setup@v6.0.9
        name: Install pnpm
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ env.BUILD_PATH }}

      - name: Build with Astro
        run: pnpm build
        working-directory: ${{ env.BUILD_PATH }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MALAYSIA_WAKTU_SOLAT }}
          channelId: live
          projectId: malaysia-waktu-solat
